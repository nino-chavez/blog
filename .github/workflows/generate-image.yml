name: Generate Feature Image

on:
  repository_dispatch:
    types: [generate-image]

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: astro-build
        run: npm install

      - name: Validate input
        id: validate
        run: |
          SLUG="${{ github.event.client_payload.slug }}"
          if [ -z "$SLUG" ]; then
            echo "Error: No slug provided"
            exit 1
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          # Determine which content directory has the file
          if [ -f "src/content/blog/${SLUG}.mdx" ]; then
            echo "content_root=src/content/blog" >> "$GITHUB_OUTPUT"
            echo "file=src/content/blog/${SLUG}.mdx" >> "$GITHUB_OUTPUT"
          elif [ -f "astro-build/src/content/blog/${SLUG}.mdx" ]; then
            echo "content_root=astro-build/src/content/blog" >> "$GITHUB_OUTPUT"
            echo "file=astro-build/src/content/blog/${SLUG}.mdx" >> "$GITHUB_OUTPUT"
          else
            echo "Error: No MDX file found for slug '${SLUG}'"
            exit 1
          fi

      - name: Generate feature image
        working-directory: astro-build
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          SLUG="${{ steps.validate.outputs.slug }}"

          # The script uses a hardcoded BASE_DIR, so we override via env
          # and run the script targeting the specific file
          node scripts/generate-illustration-images.js --dir blog "${SLUG}.mdx"

      - name: Commit and push
        run: |
          SLUG="${{ steps.validate.outputs.slug }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage the generated image and the updated MDX (script updates featureImage in frontmatter)
          git add astro-build/public/images/generated/ || true
          git add src/content/blog/ astro-build/src/content/blog/ || true

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "asset: generate feature image for ${SLUG}

            Generated via draft preview CTA
            Triggered by repository dispatch"
            git push
          fi
