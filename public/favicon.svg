<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Signal Dispatch Blog">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#0a0a0f"/>
  <!-- Pen/Writing tool -->
  <path d="M88 28L100 40L52 88L36 92L40 76Z" fill="url(#g)" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
  <!-- Pen tip -->
  <path d="M36 92L40 76L52 88Z" fill="#22d3ee"/>
  <!-- Text lines representing blog content -->
  <rect x="28" y="68" width="24" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <rect x="28" y="78" width="32" height="4" rx="2" fill="#fff" opacity="0.2"/>
  <rect x="28" y="88" width="20" height="4" rx="2" fill="#fff" opacity="0.15"/>
  <!-- Signal waves -->
  <circle cx="92" cy="92" r="8" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
  <circle cx="92" cy="92" r="16" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
</svg>
